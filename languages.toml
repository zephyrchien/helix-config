[language-server.clangd]
command = "clangd"
args = ["--header-insertion=never"]

[use-grammars]
only = [
  "c", "cpp", "d", "rust", "zig", "go",
  "python", "javascript", "lua", "bash",
  "json", "toml", "yaml", "make", "cmake"
]

[[language]]
name = "c"
indent = { tab-width = 4, unit = "    " }

[[language]]
name = "cpp"
indent = { tab-width = 4, unit = "    " }
